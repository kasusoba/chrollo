services:
  chrollo:
    build: .
    restart: unless-stopped
    ports:
      # OAuth2 callback server. Set PORT in .env (defaults to 3000) and update
      # GOOGLE_REDIRECT_URI to match, e.g. http://<your-machine-ip>:5000/auth/callback
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      # Persists Google OAuth tokens across restarts.
      # Run `touch tokens.json` first if the file doesn't exist yet.
      - ./tokens.json:/app/tokens.json
      # Persists album data
      - ./album.json:/app/album.json
